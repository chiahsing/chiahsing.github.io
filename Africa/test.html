<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<script src="main.js"></script>
		<style>
			#map {
				width: 100%;
				max-width: 400px;
				height: 400px;
			}
			#buttons {
				text-align: center;
			}
			.button {
				margin: 20px;
			}
		</style>
	</head>
	<body>
		<div id="quiz">
			<div id="progress"></div>
			<div><img id="map"></div>
			<div id="buttons">
				<div class="button"><button id="button0" value="0">Button 0</button></div>
				<div class="button"><button id="button1" value="1">Button 1</button></div>
				<div class="button"><button id="button2" value="2">Button 2</button></div>
				<div class="button"><button id="button3" value="3">Button 3</button></div>
			</div>
		</div>
		<div id="result">
			Score: <span id="score"></span> <br>
		</div>
	</body>
</html>
